# --- INIZIO FILE ---
version: "3.7"
services:
  app_proxy:
    environment:
      APP_HOST: anticristiancpu-slskd_web_1
      APP_PORT: 5030

  web:
    image: slskd/slskd:latest
    restart: on-failure
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Rome
    ports:
      - "50300:50300"
      - "5030:5030"
    volumes:
      - ${APP_DATA_DIR}/data/config:/app
      - /home/umbrel/umbrel/home/Downloads/complete/music/SoulSync:/downloads
