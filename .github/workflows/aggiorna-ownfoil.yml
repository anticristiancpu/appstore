name: Auto-Update Ownfoil

on:
  schedule:
    - cron: '0 4 * * *' 
  workflow_dispatch: 

jobs:
  update-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Scarica il repository
        uses: actions/checkout@v4

      - name: Cerca l'ultima release
        run: |
          LATEST_VERSION=$(curl -sL https://api.github.com/repos/a1ex4/ownfoil/releases/latest | jq -r ".tag_name")
          echo "Ultima versione: $LATEST_VERSION"
          
          if [ "$LATEST_VERSION" != "null" ] && [ -n "$LATEST_VERSION" ]; then
            # Rimuove l'eventuale 'v' iniziale se lo sviluppatore la usa nel nome
            CLEAN_VERSION=${LATEST_VERSION#v}
            sed -i "s/^version: .*/version: \"$CLEAN_VERSION\"/" anticristiancpu-ownfoil/umbrel-app.yml
          fi

      - name: Salva e chiudi
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add anticristiancpu-ownfoil/umbrel-app.yml
          
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update Ownfoil" && git push)
