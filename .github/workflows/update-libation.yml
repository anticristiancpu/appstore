name: Update Libation Version

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  update-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get latest Libation release
        id: get_version
        run: |
          LATEST=$(curl -s https://api.github.com/repos/rmcrackan/Libation/releases/latest | jq -r '.tag_name' | sed 's/^v//')
          echo "version=$LATEST" >> $GITHUB_OUTPUT

      - name: Get current version
        id: get_current
        run: |
          CURRENT=$(grep '^version:' anticristiancpu-libation/umbrel-app.yml | sed 's/version: *"//' | sed 's/"//')
          echo "version=$CURRENT" >> $GITHUB_OUTPUT

      - name: Update umbrel-app.yml and docker-compose.yml
        if: steps.get_version.outputs.version != steps.get_current.outputs.version
        run: |
          NEW="${{ steps.get_version.outputs.version }}"
          sed -i "s/^version: .*/version: \"${NEW}\"/" anticristiancpu-libation/umbrel-app.yml

      - name: Commit and push
        if: steps.get_version.outputs.version != steps.get_current.outputs.version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add anticristiancpu-libation/umbrel-app.yml
          git commit -m "chore: update Libation to v${{ steps.get_version.outputs.version }}"
          git push
