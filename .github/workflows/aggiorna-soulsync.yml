# --- INIZIO FILE ---
name: Auto-Update SoulSync
on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  update-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Scarica il tuo repository
        uses: actions/checkout@v4

      - name: Cerca l'ultima versione di SoulSync
        run: |
          LATEST_VERSION=$(curl -sL https://api.github.com/repos/Nezreka/SoulSync/releases/latest | jq -r ".tag_name")
          if [ "$LATEST_VERSION" != "null" ] && [ -n "$LATEST_VERSION" ]; then
            sed -i "s/^version: .*/version: \"$LATEST_VERSION\"/" anticristiancpu-soulsync/umbrel-app.yml
          fi

      - name: Salva le modifiche (Commit)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add anticristiancpu-soulsync/umbrel-app.yml
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update SoulSync alla versione più recente" && git push)