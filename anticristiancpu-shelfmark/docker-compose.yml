version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: anticristiancpu-shelfmark_web_1
      APP_PORT: 8084

  web:
    image: ghcr.io/calibrain/shelfmark:latest
    restart: on-failure
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Rome
    volumes:
      - ${APP_DATA_DIR}/data/config:/config
      - ${APP_DATA_DIR}/data/books:/books
