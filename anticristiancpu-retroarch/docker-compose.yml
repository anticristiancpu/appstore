version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: anticristiancpu-retroarch_web_1
      APP_PORT: 3001
      APP_PROXY_PORT: 3010
      APP_PROTOCOL: https

  web:
    image: lscr.io/linuxserver/retroarch:latest
    restart: on-failure
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: "Europe/Rome"
    volumes:
      - ${APP_DATA_DIR}/config:/config
