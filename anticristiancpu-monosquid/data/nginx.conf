events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        
        location / {
            root /usr/share/nginx/html;
            index index.html;
        }
        
        location /downloads/ {
            alias /downloads/;
            autoindex on;
            autoindex_exact_size off;
            autoindex_localtime on;
        }
    }
}
