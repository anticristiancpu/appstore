<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mono Squid</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            height: 100%;
            overflow: hidden;
        }
        #frame-container {
            width: 100%;
            height: 100%;
            position: relative;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .download-notice {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            font-family: Arial, sans-serif;
            font-size: 12px;
            z-index: 1000;
        }
        .download-notice a {
            color: #4CAF50;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="download-notice">
        📁 Download salvati in: <a href="/downloads/" target="_blank">/downloads</a>
    </div>
    <div id="frame-container">
        <iframe src="https://mono.squid.wtf/" 
                allow="downloads" 
                sandbox="allow-scripts allow-same-origin allow-forms allow-downloads allow-popups">
        </iframe>
    </div>
    
    <script>
        // Intercetta i download (limitato da CORS, ma tenta)
        window.addEventListener('message', function(e) {
            console.log('Download rilevato:', e.data);
        });
    </script>
</body>
</html>
