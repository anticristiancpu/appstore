version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: anticristiancpu-pinakes_nginx_1
      APP_PORT: 80
    depends_on:
      - nginx

  pinakes:
    image: ghcr.io/jbenamy/pinakes-docker:latest
    restart: on-failure
    volumes:
      - app-code:/var/www/pinakes
      - ${APP_DATA_DIR}/data/backups:/var/www/pinakes/storage/backups
      - ${APP_DATA_DIR}/data/logs:/var/www/pinakes/storage/logs
      - ${APP_DATA_DIR}/data/plugins:/var/www/pinakes/storage/plugins
      - ${APP_DATA_DIR}/data/uploads:/var/www/pinakes/public/uploads
    environment:
      DB_HOST: mariadb
      DB_USER: pinakes
      DB_PASS: pinakes
      DB_NAME: pinakes
    depends_on:
      mariadb:
        condition: service_healthy

  nginx:
    image: ghcr.io/jbenamy/pinakes-docker-nginx:latest
    restart: on-failure
    volumes:
      - app-code:/var/www/pinakes:ro
      - ${APP_DATA_DIR}/data/uploads:/var/www/pinakes/public/uploads:ro
    depends_on:
      - pinakes

  mariadb:
    image: mariadb:11
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/data/db:/var/lib/mysql
    environment:
      MARIADB_DATABASE: pinakes
      MARIADB_USER: pinakes
      MARIADB_PASSWORD: pinakes
      MARIADB_ROOT_PASSWORD: pinakes-root
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  app-code:
