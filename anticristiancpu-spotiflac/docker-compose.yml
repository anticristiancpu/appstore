version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: anticristiancpu-spotiflac_web_1
      APP_PORT: 3001
      APP_PROTOCOL: https

  web:
    image: ghcr.io/iassis/spotiflac:latest
    restart: on-failure
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Rome
    volumes:
      - ${APP_DATA_DIR}/config:/config
      - ${APP_DATA_DIR}/downloads:/downloads
    shm_size: "1gb"
    security_opt:
      - seccomp:unconfined
