version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: anticristiancpu-libation_web_1
      APP_PORT: 3000

  web:
    image: ceramicwhite/libation:latest
    restart: on-failure
    stop_grace_period: 1m
    environment:
      PUID: "1000"
      PGID: "1000"
    volumes:
      - ${APP_DATA_DIR}/books:/config/Books
      - ${APP_DATA_DIR}/data:/config/Libation
