version: "3.8"

services:
  grimmory:
    image: grimmory/grimmory:latest
    container_name: grimmory
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    ports:
      - "${APP_GRIMMORY_PORT:-6060}:6060"
    environment:
      - USER_ID=1000
      - GROUP_ID=1000
      - TZ=Europe/Rome
      - DATABASE_URL=jdbc:mariadb://mariadb:3306/grimmory
      - DATABASE_USERNAME=grimmory
      - DATABASE_PASSWORD=ChangeMe_Grimmory_2025!
      - DISK_TYPE=LOCAL
    volumes:
      - "${APP_DATA_DIR}/data:/app/data"
      - "${APP_DATA_DIR}/books:/books"
      - "${APP_DATA_DIR}/bookdrop:/bookdrop"
    networks:
      - grimmory_network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:6060"]
      interval: 30s
      timeout: 10s
      retries: 5

  mariadb:
    image: mariadb:11
    container_name: grimmory-mariadb
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=ChangeMe_MariaDBRoot_2025!
      - MYSQL_DATABASE=grimmory
      - MYSQL_USER=grimmory
      - MYSQL_PASSWORD=ChangeMe_Grimmory_2025!
    volumes:
      - "${APP_DATA_DIR}/db:/var/lib/mysql"
    networks:
      - grimmory_network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  grimmory_network:
    driver: bridge
