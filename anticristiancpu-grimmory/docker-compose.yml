version: "3.8"

services:
  grimmory:
    image: grimmory/grimmory:latest
    container_name: grimmory
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    ports:
      - "${APP_GRIMMORY_PORT:-9091}:9091"
    environment:
      APP_USER_ID: "1000"
      APP_GROUP_ID: "1000"
      TZ: "Europe/Rome"
      DATABASE_URL: "jdbc:mariadb://mariadb:3306/grimmory"
      DB_USER: "grimmory"
      DB_PASSWORD: "GrimmoryPass2025!"
      DISK_TYPE: "LOCAL"
    volumes:
      - "${APP_DATA_DIR}/data/books:/books"
      - "${APP_DATA_DIR}/data/config:/config"
    networks:
      - grimmory_network

  mariadb:
    image: mariadb:11
    container_name: grimmory-mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "GrimmoryRoot2025!"
      MYSQL_DATABASE: "grimmory"
      MYSQL_USER: "grimmory"
      MYSQL_PASSWORD: "GrimmoryPass2025!"
      DB_USER_ID: "1000"
      DB_GROUP_ID: "1000"
    volumes:
      - "${APP_DATA_DIR}/data/db:/var/lib/mysql"
    networks:
      - grimmory_network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  grimmory_network:
    driver: bridge
