version: "3.7"

services:
  grimmory:
    image: grimmory/grimmory:latest
    container_name: grimmory
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    ports:
      - "${APP_GRIMMORY_PORT:-6060}:6060"
    environment:
      - USER_ID=1000
      - GROUP_ID=1000
      - TZ=Europe/Rome
      - DATABASE_URL=jdbc:mariadb://mariadb:3306/grimmory
      - DATABASE_USERNAME=grimmory
      - DATABASE_PASSWORD=ChangeMe_Grimmory_2025!
      - DISK_TYPE=LOCAL
    volumes:
      - "${APP_DATA_DIR}/data:/app/data"
      - "${APP_DATA_DIR}/books:/books"
      - "${APP_DATA_DIR}/bookdrop:/bookdrop"
    healthcheck:
      test: wget -q -O - http://localhost:6060/api/v1/healthcheck
      interval: 60s
      retries: 5
      start_period: 60s
      timeout: 10s
    networks:
      - grimmory_network

  mariadb:
    image: lscr.io/linuxserver/mariadb:11.4.5
    container_name: grimmory-mariadb
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Rome
      - MYSQL_ROOT_PASSWORD=ChangeMe_MariaDBRoot_2025!
      - MYSQL_DATABASE=grimmory
      - MYSQL_USER=grimmory
      - MYSQL_PASSWORD=ChangeMe_Grimmory_2025!
    volumes:
      - "${APP_DATA_DIR}/mariadb:/config"
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - grimmory_network

networks:
  grimmory_network:
    driver: bridge
