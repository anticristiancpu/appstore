manifestVersion: 1
id: pkvault
category: utilities
name: PKVault
version: "latest"
tagline: Gestione centralizzata dei box e dei salvataggi Pokémon.
description: >-
  PKVault è uno strumento di archiviazione e manipolazione dei salvataggi Pokémon basato su PKHeX. 
  Simile a Pokémon Home, ma progettato per funzionare totalmente offline. Permette di spostare Pokémon 
  tra diversi salvataggi, convertirli tra generazioni e gestire il tuo Pokédex direttamente dal server.
